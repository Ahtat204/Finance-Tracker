spring:
  application:
    name: FinanceTrackerBackend
    version: 1.1
  profiles:
    active: dev
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

logging:
  logback:
    rollingpolicy:
      clean-history-on-start: true

jwt_secret: ${JWT_SECRET}
bucket_size: 20
