spring:
  datasource:
    url: ${PROD_DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  jpa:
    show-sql: false
    hibernate:
      dl-auto: validate

  data:
    redis:
      host: ${REDIS_HOST}
      port: 6379
logging:
  level:
    sql: info
    root: info
    org.springframework: info