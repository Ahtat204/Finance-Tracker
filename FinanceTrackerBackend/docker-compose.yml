services:
  db:
    image: postgres:13.1-alpine
    container_name: db
    environment:
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${database}
    networks:
      - finance-tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
  cache:
    image: redis:latest
    container_name: redis_cache
    restart: on-failure
    volumes:
      - redis_cache:/var/lib/data
    networks:
      - finance-tracker
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: finance-tracker:latest
    container_name: app
    depends_on:
      - db
      - cache
    environment:
      SPRING_DATASOURCE_URL: ${PROD_DB_URL}
      SPRING_DATASOURCE_USERNAME: ${DB_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${DB_PASSWORD}
      SPRING_PROFILES_ACTIVE: ${SPRING_ENVIRONMENT}
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      REDIS_HOST: redis_cache
      JWT_SECRET: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9eyJzdWIiOiIxMjM0NTY3ODkwIiwibmFtZSI6IkpvaG4gRG9lIiwiYWRtaW4iOnRydWUsImlhdCI6MTUxNjIzOTAyMn0KMUFsIDTnFmyG3nMiGM6H9FNFUROf3wh7SmqJpQV30
    ports:
      - "${APP_PORT}:8080"
    networks:
      - finance-tracker
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
    - ./prometheus.yml:/etc/prometheus/prometheus.yml
    - prometheus_data:/prometheus
    ports:
    - "9090:9090"
    restart: unless-stopped
    depends_on:
      - app
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    networks:
      finance-tracker:
  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    links:
      - prometheus:prometheus
    volumes:
      - ./grafana:/var/lib/grafana
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=password
    depends_on:
      - prometheus

volumes:
  postgres_data:
  redis_cache:
  prometheus_data:
networks:
  finance-tracker:
      driver: bridge


